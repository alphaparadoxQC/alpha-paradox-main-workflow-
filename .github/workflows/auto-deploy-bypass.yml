name: Bypass Free Plan Deployment Limit
on:
  push:
    branches:
      - main
jobs:
  force-owner-trigger:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Configure Git Credentials as Project Owner
        run: |
          git config --global user.name "alphaparadoxQC"
          git config --global user.email "alphaparadox02@gmail.com"
      - name: Trigger Vercel/Netlify Deployment via Empty Commit
        run: |
          git commit --allow-empty -m "Trigger deployment [skip ci]"
          git push origin main
